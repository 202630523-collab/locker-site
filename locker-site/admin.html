<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>관리자 페이지</title>
</head>

<body>

<h1>예약 관리</h1>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
 apiKey:"여기에키",
 authDomain:"프로젝트.firebaseapp.com",
 databaseURL:"https://프로젝트-default-rtdb.firebaseio.com",
 projectId:"프로젝트"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const list=document.getElementById("list");

async function load(){

list.innerHTML="";

for(let i=1;i<=33;i++){

let r=ref(db,"lockers/"+i);
let s=await get(r);

if(s.exists()){

let div=document.createElement("div");

div.innerHTML=i+"번 : "+s.val().name+" ";

let btn=document.createElement("button");
btn.innerText="삭제";

btn.onclick=async ()=>{

await remove(r);
load();

};

div.appendChild(btn);

list.appendChild(div);

}

}

}

load();

</script>

</body>
</html>
